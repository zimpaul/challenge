<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery Challenge - Nova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container header-container">
            <div class="logo">NOVA</div>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#" class="active">Gallery</a></li>
                    <li><a href="#">Featured</a></li>
                    <li><a href="#">Contact Us</a></li>
                </ul>
            </nav>
            <div class="search-box">
                <i class="fas fa-search" style="color: #fff;"></i>
                <input type="text" placeholder="Search images...">
                
            </div>
            <div class="header-icons">
                <i class="fas fa-question-circle"></i>
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
    </header>

    <!-- Gallery Section -->
    <section class="gallery-section">
        <div class="container">
            <div class="gallery-grid">
                <!-- Item 1: Standard -->
                <div class="gallery-item item-1" onclick="openLightbox(this)">
                    <img src="../images/gallary1.jpg" alt="Gallery Image 1">
                    <div class="overlay"><i class="fas fa-search-plus"></i></div>
                </div>

                <!-- Item 2: Tall -->
                <div class="gallery-item item-2 tall" onclick="openLightbox(this)">
                    <img src="../images/gallary2.jpg" alt="Gallery Image 2">
                    <div class="overlay"><i class="fas fa-search-plus"></i></div>
                </div>

                <!-- Item 3: Wide -->
                <div class="gallery-item item-3 wide" onclick="openLightbox(this)">
                    <img src="../images/gallary3.jpg" alt="Gallery Image 3">
                    <div class="overlay"><i class="fas fa-search-plus"></i></div>
                </div>

                <!-- Item 4: Standard -->
                <div class="gallery-item item-4" onclick="openLightbox(this)">
                    <img src="../images/gallary4.jpg" alt="Gallery Image 4">
                    <div class="overlay"><i class="fas fa-search-plus"></i></div>
                </div>

                <!-- Item 5: Standard -->
                <div class="gallery-item item-5" onclick="openLightbox(this)">
                    <img src="../images/gallary5.jpg" alt="Gallery Image 5">
                    <div class="overlay"><i class="fas fa-search-plus"></i></div>
                </div>

                <!-- Item 6: Standard -->
                <div class="gallery-item item-6" onclick="openLightbox(this)">
                    <img src="../images/gallary6.jpg" alt="Gallery Image 6">
                    <div class="overlay"><i class="fas fa-search-plus"></i></div>
                </div>

                <!-- Item 7: Standard -->
                <div class="gallery-item item-7" onclick="openLightbox(this)">
                    <img src="../images/gallary7.jpg" alt="Gallery Image 7">
                    <div class="overlay"><i class="fas fa-search-plus"></i></div>
                </div>

                <!-- Item 8: Standard -->
                <div class="gallery-item item-8" onclick="openLightbox(this)">
                    <img src="../images/gallary8.jpg" alt="Gallery Image 8">
                    <div class="overlay"><i class="fas fa-search-plus"></i></div>
                </div>

                <!-- Item 9: Wide -->
                <div class="gallery-item item-9 wide" onclick="openLightbox(this)">
                    <img src="../images/gallary9.jpg" alt="Gallery Image 9">
                    <div class="overlay"><i class="fas fa-search-plus"></i></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <!-- Contact Form -->
                <div class="footer-section">
                    <h3>Contact Us</h3>
                    <p>Send Us A Message</p>
                    <form class="contact-form">
                        <input type="text" placeholder="Full Name">
                        <input type="email" placeholder="Your Email">
                        <textarea placeholder="Your Message"></textarea>
                        <button type="submit" class="btn-submit">Submit</button>
                    </form>
                </div>

                <!-- Sitemap -->
                <div class="footer-section sitemap">
                    <h3>Sitemap</h3>
                    <p>All Our Pages</p>
                    <ul>
                        <li><a href="#">Home</a></li>
                        <li><a href="#">About Us</a></li>
                        <li><a href="#">Features</a></li>
                        <li><a href="#">Pricing</a></li>
                        <li><a href="#">Contact Us</a></li>
                    </ul>
                </div>

                <!-- Logo & Info -->
                <div class="footer-section">
                    <div class="footer-logo">NOVA</div>
                    <div class="footer-contact-info">
                        <p><i class="fas fa-phone"></i> (080) 123-4567</p>
                        <p><i class="fas fa-envelope"></i> contact@novacompany.com</p>
                    </div>
                </div>
            </div>

            <div class="copyright">
                Copyright 2026. All Rights Reserved | Designed by Nova Company
            </div>
        </div>
    </footer>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" src="" alt="Full size image">
    </div>

    <script>
        // Lightbox Functionality
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(element) {
            const img = element.querySelector('img');
            lightboxImg.src = img.src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent scrolling
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto'; // Restore scrolling
        }

        // Close lightbox when clicking outside the image
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // Close lightbox with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
